name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend:
    name: Lint & Test Frontend (Svelte)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint Svelte/TS
        # Running the package.json lint script
        run: npm run lint
        
      - name: Check Formatting
        # Note: the package.json "format" script writes changes, so we use npx prettier --check in CI
        run: npx prettier --check .
        
      - name: Run Tests
        run: npm run test

  backend:
    name: Lint & Test Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
            
      - name: Setup Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          rustflags: ''
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          
      - name: Check formatting
        working-directory: ./src-tauri
        run: cargo fmt --all -- --check
        
      - name: Run Clippy
        working-directory: ./src-tauri
        run: cargo clippy --all-targets --all-features
        
      - name: Run Tests
        working-directory: ./src-tauri
        run: cargo test --all-features
